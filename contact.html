<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Contact NovaHost</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="plans.html">Hosting Plans</a>
    <a href="contact.html">Contact</a>
</nav>

<section class="contact">
    <form id="contactForm" action="https://formspree.io/f/mdawabqo" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <textarea name="message" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
    <div id="formMessage"></div>
    <div id="formError"></div>
</section>

<script>
const form = document.getElementById('contactForm');
const successDiv = document.getElementById('formMessage');
const errorDiv = document.getElementById('formError');

form.addEventListener('submit', async function(e) {
    e.preventDefault();
    successDiv.textContent = '';
    errorDiv.textContent = '';

    const formData = new FormData(form);
    try {
        const response = await fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
            successDiv.textContent = 'Message sent successfully! Thank you for contacting us.';
            form.reset();
        } else {
            errorDiv.textContent = 'Failed to send message. Please try again later.';
        }
    } catch (error) {
        errorDiv.textContent = 'Failed to send message. Please check your connection.';
    }
});
</script>

</body>
</html>
