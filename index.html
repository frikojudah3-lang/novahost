<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaHost Plans</title>
</head>
<body>

<h2>Choose a Plan</h2>

<div class="plan">
  <h3>Basic Plan</h3>
  <p>50 GHS / month</p>
  <label>
    Months:
    <input type="number" class="months" min="1" value="1">
  </label>
  <button class="pay-now" data-price="50" data-plan="Basic">Pay Now</button>
</div>

<div class="plan">
  <h3>Standard Plan</h3>
  <p>120 GHS / month</p>
  <label>
    Months:
    <input type="number" class="months" min="1" value="1">
  </label>
  <button class="pay-now" data-price="120" data-plan="Standard">Pay Now</button>
</div>

<div class="plan">
  <h3>Premium Plan</h3>
  <p>250 GHS / month</p>
  <label>
    Months:
    <input type="number" class="months" min="1" value="1">
  </label>
  <button class="pay-now" data-price="250" data-plan="Premium">Pay Now</button>
</div>

<script src="paystack.js"></script> <!-- Your JS file -->
</body>
</html>
