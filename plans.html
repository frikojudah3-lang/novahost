<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hosting Plans</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"></script>

<body>

<header>
<h1>Our Hosting Plans</h1>
<div id="userPanel">
    <span id="welcomeMsg"></span>
    <button id="loginBtn">Login</button>
    <button id="signupBtn">Sign Up</button>

</div>

<nav>
<a href="index.html">Home</a>

<section class="plans" id="plansSection">

<div class="plan">
<h2>Basic Plan</h2>
<p>GHS 250/month</p>
<ul>
<li>1 Website</li>
<li>10GB Storage</li>
<li>Free SSL</li>
</ul>
<button class="payBtn" data-plan="Basic" data-price="25000">Pay Now</button>
</div>

<div class="plan">
<h2>Standard Plan</h2>
<p>GHS 550/month</p>
<ul>
<li>5 Websites</li>
<li>50GB Storage</li>

</ul>
<button class="payBtn" data-plan="Standard" data-price="55000">Pay Now</button>
</div>

<div class="plan">
<h2>Premium Plan</h2>
<p>GHS 2,500/month</p>
<ul>
<li>Unlimited Websites</li>
<li>100GB Storage</li>
<li>Free SSL</li>
</ul>
<button class="payBtn" data-plan="Premium" data-price="250000">Pay Now</button>

</section>

<script src="auth.js"></script>
